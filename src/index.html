<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <title>Melian Kor</title>
    <meta
      name="description"
      content="Portfolio personal de Melian Kor con enlaces sociales y acceso al código fuente de la web."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="./js/main.js" defer></script>
  </head>
  <body>
    <div class="site-shell">
      <div class="theme-toggle-wrap">
        <button
          class="theme-toggle hover-lift"
          type="button"
          aria-label="Toggle theme"
          data-theme-toggle
        ></button>
      </div>
      <main class="main-content">
        <div class="content-root">
          <section class="hero-section">
            <h1 class="hero-title animate-fade-in">Melian Kor</h1>
            <div class="social-links animate-slide-up">
              <a
                class="social-link hover-scale animate-scale-in"
                style="animation-delay: 0ms"
                href="https://github.com/meliankor"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="GitHub"
              >
                <span class="social-icon bi bi-github" aria-hidden="true"></span>
              </a>
              <a
                class="social-link hover-scale animate-scale-in"
                style="animation-delay: 100ms"
                href="https://x.com/meliankor"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="X"
              >
                <span class="social-icon bi bi-twitter-x" aria-hidden="true"></span>
              </a>
              <a
                class="social-link hover-scale animate-scale-in"
                style="animation-delay: 200ms"
                href="https://www.youtube.com/@meliankor"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="YouTube"
              >
                <span class="social-icon bi bi-youtube" aria-hidden="true"></span>
              </a>
              <a
                class="social-link hover-scale animate-scale-in"
                style="animation-delay: 300ms"
                href="https://discord.com/users/1320818209338822697"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Discord"
              >
                <span class="social-icon bi bi-discord" aria-hidden="true"></span>
              </a>
              <a
                class="social-link hover-scale animate-scale-in"
                style="animation-delay: 400ms"
                href="https://ko-fi.com/meliankor"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Ko-fi"
              >
                <svg class="social-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M23.881 8.948c-.773-4.085-4.859-4.593-4.859-4.593H.723c-.604 0-.679.798-.679.798s-.082 7.324-.022 11.822c.164 2.424 2.586 2.672 2.586 2.672s8.267-.023 11.966-.049c2.438-.426 2.683-2.566 2.658-3.734 4.352.24 7.422-2.831 6.649-6.916zm-11.062 3.511c-1.246 1.453-4.011 3.976-4.011 3.976s-.121.119-.31.023c-.076-.057-.108-.09-.108-.09-.443-.441-3.368-3.049-4.034-3.954-.709-.965-.914-3.007.938-3.932 1.704-.664 3.401.737 3.401.737s1.199-1.689 2.91-1.307c1.741.392 2.545 2.495 1.214 4.548zm6.174 1.219c-.877.828-2.18.699-2.18.699v-5.209c-.012 0 .389-.489 1.787-.608 1.329-.109 2.345.862 2.345 2.378 0 1.516-1.073 2.428-1.952 2.74z"/>
                </svg>
              </a>
            </div>
          </section>
          <section class="projects-section">
            <div class="container">
              <h2 class="projects-title" data-reveal style="--reveal-delay: 0ms">Proyectos</h2>
              <div class="projects-grid" data-reveal style="--reveal-delay: 120ms">
                <a
                  class="project-card"
                  href="https://github.com/meliankor/home"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <div class="project-card-header">
                    <h3 class="project-card-title">Source</h3>
                    <span class="project-card-arrow bi bi-arrow-up-right" aria-hidden="true"></span>
                  </div>
                  <p class="project-card-subtitle">
                    Aquí puedes ver el código fuente de esta página web.
                  </p>
                </a>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
