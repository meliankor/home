<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <title>Melian Kor</title>
    <meta
      name="description"
      content="Portfolio personal de Melian Kor con enlaces sociales y acceso al código fuente de la web."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="./js/main.js" defer></script>
  </head>
  <body>
    <div class="site-shell">
      <div class="theme-toggle-wrap">
        <button
          class="theme-toggle hover-lift"
          type="button"
          aria-label="Toggle theme"
          data-theme-toggle
        ></button>
      </div>
      <main class="main-content">
        <div class="content-root">
          <section class="hero-section">
            <h1 class="hero-title animate-fade-in">Melian Kor</h1>
            <div class="social-links animate-slide-up">
              <a
                class="social-link hover-scale animate-scale-in"
                style="animation-delay: 0ms"
                href="https://github.com/meliankor"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="GitHub"
              >
                <span class="social-icon bi bi-github" aria-hidden="true"></span>
              </a>
              <a
                class="social-link hover-scale animate-scale-in"
                style="animation-delay: 100ms"
                href="https://discord.com/users/1320818209338822697"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Discord"
              >
                <span class="social-icon bi bi-discord" aria-hidden="true"></span>
              </a>
            </div>
          </section>
          <section class="projects-section animate-slide-up">
            <div class="container">
              <h2 class="projects-title animate-fade-in">Proyectos</h2>
              <div class="projects-grid animate-fade-in" style="animation-delay: 100ms">
                <a
                  class="project-card animate-scale-in"
                  href="https://github.com/meliankor/home"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <div class="project-card-header">
                    <h3 class="project-card-title">Source</h3>
                    <span class="project-card-arrow bi bi-arrow-up-right" aria-hidden="true"></span>
                  </div>
                  <p class="project-card-subtitle">
                    Aquí puedes ver el código fuente de esta página web.
                  </p>
                </a>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
